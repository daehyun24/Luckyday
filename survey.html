<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-527503945"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-THQ2ZHHBTY');
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앱 출시 사전 설문조사</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; color: #2c3e50; line-height: 1.6; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; max-width: 500px; width: 100%; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h2 { margin-top: 0; color: #3498db; font-size: 1.4rem; line-height: 1.4; }
        p { font-size: 0.95rem; color: #555; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* 다중 선택 체크박스 스타일 */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 8px; margin-bottom: 0; cursor: pointer; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-pay { background: #e74c3c; color: white; font-size: 1.2rem; }
        
        #step2 { display: none; text-align: center; }
        .discount-badge { display: inline-block; background: #fff3cd; color: #856404; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; border: 1px solid #ffeeba; }
        
        #email-section { display: none; margin-top: 15px; background: #f1f8ff; padding: 15px; border-radius: 10px; border: 1px solid #d0e8ff; }
        .toggle-container { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.85rem; color: #444; }
        .toggle-container input { margin-top: 3px; }
        
        #other-genre-input { margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <h2>소통하며 읽는 즐거움,<br>독서 커뮤니티 앱 출시 예고 🚀</h2>
        <p>문장마다 대화하고 생각을 나누는 새로운 독서 경험! 더 많은 책을 함께 읽을 수 있는 앱 출시를 준비 중입니다. 소중한 의견을 들려주세요.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <div class="form-group">
            <label>1. 추후 출시될 앱에서 어떤 장르의 책을 만나보고 싶으신가요? (다중 선택 가능)</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="genre" value="고전 문학"> 고전 문학</label>
                <label><input type="checkbox" name="genre" value="현대 베스트셀러"> 현대 베스트셀러</label>
                <label><input type="checkbox" name="genre" value="에세이/자기계발"> 에세이/자기계발</label>
                <label><input type="checkbox" name="genre" value="자연/기술 과학"> 자연/기술 과학</label>
                <label><input type="checkbox" name="genre" value="예술/철학"> 예술/철학</label>
                <label><input type="checkbox" name="genre" value="학술 논문"> 학술 논문</label>
                <label><input type="checkbox" name="genre" value="웹소설"> 웹소설</label>
                <label><input type="checkbox" name="genre" value="블로그/일기"> 블로그/일기</label>
                <label><input type="checkbox" name="genre" value="기타" id="other-check"> 기타 (직접 입력)</label>
            </div>
            <input type="text" id="other-genre-input" placeholder="원하는 장르를 적어주세요.">
        </div>

        <div class="form-group">
            <label>2. 앱에서 꼭 함께 읽고 싶은 특정 도서나 작가가 있나요?</label>
            <input type="text" id="book-request" placeholder="예: 데미안, 무라카미 하루키">
        </div>

        <div class="form-group">
            <label>3. 앱 출시 알림을 위한 이메일 제공 (선택)</label>
            <label class="toggle-container">
                <input type="checkbox" id="email-toggle">
                <span>앱 출시 소식과 함께 여러 사전예약 제공 혜택을 이메일로 받겠습니다.</span>
            </label>
            
            <div id="email-section">
                <label style="color: #3498db;">알림 받을 이메일 주소</label>
                <input type="email" id="email-input" placeholder="example@email.com">
            </div>
        </div>

        <button class="btn btn-primary" id="submit-btn">설문 제출하기</button>
    </div>

    <div id="step2">
        <h2>🎉 사전예약 특별 혜택</h2>
        <div class="discount-badge">정가 30,000원 ➔ 5,000원 (최대 할인)</div>
        <p>지금 <b>5,000원</b>을 사전 결제 예약하시면,<br>앱 정식 출시 후 <b>6개월 무제한 구독권</b>을 드립니다!</p>
        <p style="color: #e74c3c; font-weight: bold; font-size: 0.9rem;">*지금 신청하지 않으면 이 혜택은 소멸됩니다.</p>
        
        <button class="btn btn-pay" id="pay-btn">지금 5,000원에 예약하기</button>
        <button class="btn" style="background: none; color: #999; font-size: 0.9rem;" onclick="window.close()">아니요, 괜찮습니다.</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 본인의 Firebase 설정값을 여기에 붙여넣으세요
    const firebaseConfig = {
        apiKey: "AIzaSyCqhjSpLMhkCmHnXGiodUGL0y0WpcQPIC0",
        authDomain: "luckyday-1.firebaseapp.com",
        projectId: "luckyday-1",
        storageBucket: "luckyday-1.firebasestorage.app",
        messagingSenderId: "666486228218",
        appId: "1:666486228218:web:25c5107bb49db3dcb33543"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let docId = null;

    // 기타 항목 체크 시 입력창 노출
    const otherCheck = document.getElementById('other-check');
    const otherInput = document.getElementById('other-genre-input');
    otherCheck.onchange = () => {
        otherInput.style.display = otherCheck.checked ? 'block' : 'none';
    };

    // 이메일 토글 및 버튼 문구 제어
    const emailToggle = document.getElementById('email-toggle');
    const emailSection = document.getElementById('email-section');
    const submitBtn = document.getElementById('submit-btn');

    emailToggle.onchange = () => {
        if (emailToggle.checked) {
            emailSection.style.display = 'block';
            submitBtn.textContent = '앱 출시 알림 신청하기';
        } else {
            emailSection.style.display = 'none';
            submitBtn.textContent = '설문 제출하기';
        }
    };

    // 데이터 제출
    submitBtn.onclick = async () => {
        const email = document.getElementById('email-input').value;
        const book = document.getElementById('book-request').value;
        const isEmailSubscribed = emailToggle.checked;

        // 선택된 장르 수집
        const selectedGenres = Array.from(document.querySelectorAll('input[name="genre"]:checked'))
                                    .map(cb => cb.value);
        if (otherCheck.checked && otherInput.value) {
            selectedGenres.push(`기타: ${otherInput.value}`);
        }

        if(isEmailSubscribed && !email.includes('@')) { 
            alert('알림을 받으시려면 올바른 이메일을 입력해주세요.'); 
            return; 
        }

        try {
            const docRef = await addDoc(collection(db, "surveys"), {
                email: isEmailSubscribed ? email : "비공개",
                requestedBook: book,
                genres: selectedGenres,
                intentToPay: false,
                wantsNotification: isEmailSubscribed,
                submittedAt: new Date().toLocaleString()
            });
            docId = docRef.id;

            if (isEmailSubscribed) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            } else {
                alert('소중한 의견 감사합니다! 앱 개발에 적극 반영하겠습니다.');
                window.close();
            }
        } catch (e) {
            alert('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        }
    };

    // 결제 의향 확인
    document.getElementById('pay-btn').onclick = async () => {
        if(docId) {
            await updateDoc(doc(db, "surveys", docId), { intentToPay: true });
        }
        alert('사전예약 의사가 확인되었습니다!\n아직 시스템 준비 중이라 실제 결제는 이루어지지 않았습니다.\n출시 시점에 가장 큰 혜택으로 찾아뵙겠습니다. 감사합니다!');
        window.close();
    };
</script>
</body>
</html>
