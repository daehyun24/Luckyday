<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문조사 및 사전예약</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; color: #2c3e50; line-height: 1.6; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; max-width: 500px; width: 100%; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h2 { margin-top: 0; color: #3498db; font-size: 1.4rem; }
        p { font-size: 0.95rem; color: #555; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .radio-group label { font-weight: normal; display: block; margin-bottom: 8px; cursor: pointer; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-pay { background: #e74c3c; color: white; font-size: 1.2rem; }
        #step2 { display: none; text-align: center; }
        .discount-badge { display: inline-block; background: #fff3cd; color: #856404; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <h2>새로운 책 출시 알림 🚀</h2>
        <p>더 많은 책을 준비 중입니다. 알림을 받으실 이메일과 선호하는 장르를 알려주세요!</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <div class="form-group">
            <label>1. 어떤 장르를 가장 좋아하시나요?</label>
            <div class="radio-group">
                <label><input type="radio" name="genre" value="한국소설" checked> 한국 근대 소설</label>
                <label><input type="radio" name="genre" value="해외문학"> 해외 고전 문학</label>
                <label><input type="radio" name="genre" value="현대소설"> 현대 베스트셀러</label>
                <label><input type="radio" name="genre" value="에세이"> 에세이/자기계발</label>
            </div>
        </div>

        <div class="form-group">
            <label>2. 다음으로 읽고 싶은 구체적인 책이 있나요?</label>
            <input type="text" id="book-request" placeholder="책 제목을 적어주세요.">
        </div>

        <div class="form-group">
            <label>3. 출시 알림용 이메일 주소</label>
            <input type="email" id="email-input" placeholder="example@email.com">
        </div>

        <button class="btn btn-primary" id="submit-btn">알림 신청하고 혜택 받기</button>
    </div>

    <div id="step2">
        <h2>🎉 깜짝 사전예약 혜택</h2>
        <div class="discount-badge">출시 기념 83% 파격 할인</div>
        <p>지금 <b>5,000원</b>을 먼저 결제하시면,<br>정식 출시 후 <b>6개월 무제한 구독권</b>을 드립니다!</p>
        <p style="color: #e74c3c; font-weight: bold;">(정가 30,000원 상당)</p>
        
        <button class="btn btn-pay" id="pay-btn">지금 5,000원에 예약하기</button>
        <button class="btn" style="background: none; color: #999; font-size: 0.9rem;" onclick="window.close()">아니요, 알림만 받을게요.</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 본인의 Firebase 설정값을 여기에 다시 붙여넣으세요!
    const firebaseConfig = {
        apiKey: "AIzaSyCqhjSpLMhkCmHnXGiodUGL0y0WpcQPIC0",
        authDomain: "luckyday-1.firebaseapp.com",
        projectId: "luckyday-1",
        storageBucket: "luckyday-1.firebasestorage.app",
        messagingSenderId: "666486228218",
        appId: "1:666486228218:web:25c5107bb49db3dcb33543"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let docId = null;

    // 설문 제출
    document.getElementById('submit-btn').onclick = async () => {
        const email = document.getElementById('email-input').value;
        const book = document.getElementById('book-request').value;
        const genre = document.querySelector('input[name="genre"]:checked').value;

        if(!email.includes('@')) { alert('올바른 이메일을 입력해주세요.'); return; }

        const docRef = await addDoc(collection(db, "surveys"), {
            email, book, genre, intentToPay: false, date: new Date().toLocaleString()
        });
        docId = docRef.id;

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    };

    // 결제 버튼 (데이터 기록만 하고 알림창 띄우기)
    document.getElementById('pay-btn').onclick = async () => {
        if(docId) {
            await updateDoc(doc(db, "surveys", docId), { intentToPay: true });
        }
        alert('사전예약 의사가 확인되었습니다!\n아직 결제 시스템이 준비 중이라 실제 결제는 진행되지 않았습니다.\n출시 때 입력하신 이메일로 가장 먼저 연락드릴게요!');
        window.close();
    };
</script>
</body>
</html>
